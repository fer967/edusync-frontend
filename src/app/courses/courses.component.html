<div class="courses-container">
    <h2>Lista de Cursos</h2>
    <div class="courses-grid">
        <div class="course-card" *ngFor="let course of courses">
            <h3>{{ course.title }}</h3>
            <p>{{ course.description }}</p>
            <button [routerLink]="['/courses', course.id]">
                Ver curso
            </button>
        </div>
    </div>
</div>
